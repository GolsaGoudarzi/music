name: Scan Sheet Music

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Requirements
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
        sudo rm -f /etc/apt/sources.list.d/azure-cli.list
        sudo apt-get update --allow-releaseinfo-change || true
        sudo apt-get install -y --fix-missing fluidsynth libraw-dev

    - name: Install AI Libraries
      run: |
        pip install --upgrade pip
        # Install libraries quietly to prevent log truncation
        pip install -q oemer music21

    - name: Pre-download AI Weights Cleanly
      run: |
        # Manually fetch the AI model weights quietly so it doesn't flood the terminal screen
        mkdir -p ~/.oemer
        wget -q -O ~/.oemer/1st_weights.h5 "https://github.com/Brossard/oemer/releases/download/v0.1.0/1st_weights.h5" || true

    - name: Run Converter Script
      run: python converter.py
