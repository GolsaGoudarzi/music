name: Scan Sheet Music

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Requirements
      run: |
        sudo apt-get update
        sudo apt-get install -y fluidsynth libraw-dev

    - name: Install AI Libraries
      run: |
        pip install oemer music21

    - name: Run Converter Script
      run: python converter.py
